<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Traker</title>
    <!-- google font start -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- google font end -->
    <!-- fontawsome start -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- fontawsome end -->
    <!-- Tailwindcss start -->

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwindcss end -->
    <link rel="shortcut icon" href="./images/job.jpg" type="image/x-icon">
</head>
<!-- css part -->
<style>
    * {
        font-family: "Geist", sans-serif;
    }
</style>
<body class="bg-[#F8FAFC]">

  <!-- header part -->
  <section class="mx-auto py-12 px-4 container">
    <h1 class="text-3xl font-bold text-black mb-8">Job Application Tracker</h1>

    <div id="cardSection" class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-white p-6 rounded-lg shadow">
        <p class="text-[#323B49] text-sm font-medium">Total</p>
        <h2 id="totalCount" class="text-3xl font-bold mt-2 text-black">0</h2>
      </div>

      <div class="bg-white p-6 rounded-lg shadow">
        <p class="text-[#323B49] text-sm font-medium">Interview</p>
        <h2 id="interviewCount" class="text-3xl font-bold mt-2 text-[#10B981]">0</h2>
      </div>

      <div class="bg-white p-6 rounded-lg shadow">
        <p class="text-[#323B49] text-sm font-medium">Rejected</p>
        <h2 id="rejectedCount" class="text-3xl font-bold mt-2 text-[#EF4444]">0</h2>
      </div>
    </div>
  </section>

  <!-- body part -->
  <section class="mx-auto py-12 px-4 container">
    <div class="flex items-center justify-between">
      <h2 class="text-[20px] font-bold text-[#002C5C]">Available Jobs</h2>
      <p id="tabCountRight" class="text-[16px] text-[#64748B]">0 Jobs</p>
    </div>

    <div class="mt-4 flex flex-wrap gap-2">
      <button id="tabAll"
        class="px-[30px] py-[8px] rounded-md bg-blue-600 text-white text-[12px] font-semibold hover:bg-blue-200">
        All
      </button>

      <button id="tabInterview"
        class="px-5 py-2 rounded-md bg-white text-[#64748B] text-[12px] font-semibold hover:bg-blue-200">
        Interview
      </button>

      <button id="tabRejected"
        class="px-5 py-2 rounded-md bg-white text-[#64748B] text-[12px] font-semibold hover:bg-blue-200">
        Rejected
      </button>
    </div>

   <div id="jobsContainer" class="mt-6 space-y-6"></div>
  </section>
  
   
   
    
   
    <script src="js/script.js"></script>
    </body>
</html>
